services:
  serverops-ai-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: serverops-ai-bot:latest
    container_name: serverops-ai-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///data/serverops.db}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
      - /var/log:/host/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    security_opt:
      - no-new-privileges:true
    init: true
    healthcheck:
      test: ["CMD", "python", "-m", "app.healthcheck"]
      interval: 60s
      timeout: 10s
      start_period: 20s
      retries: 3

